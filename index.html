<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Ebook Library</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

header{
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

iframe{
    width:100%;
    height:500px;
    border:none;
}

.buttons{
    display:flex;
    gap:10px;
    padding:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:10px 15px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.btn:hover{
    background:#333;
}
</style>
</head>

<body>

<header>📚 Modern Ebook Reader</header>

<div class="container">

<div class="card">

<!-- Ebook Viewer -->
<iframe src="https://archive.org/embed/TheArtOfWarBySunTzu"
></iframe>

<!-- Buttons -->
<div class="buttons">

<a class="btn" href="https://archive.org/download/TheArtOfWarBySunTzu/TheArtOfWarBySunTzu.pdf" target="_blank">
⬇ Download PDF
</a>

<a class="btn" href="https://archive.org/details/TheArtOfWarBySunTzu" target="_blank">
🌐 Open Source Page
</a>

</div>

</div>

</div>

</body>
</html>
